<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>

    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34e05a"/>
      <stop offset="100%" stop-color="#00b84f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Equalizer -->
  <g fill="#28d84d" opacity="0.55">
    <rect x="70" y="170" width="12" height="110" rx="6"/>
    <rect x="90" y="145" width="12" height="160" rx="6"/>
    <rect x="110" y="120" width="12" height="210" rx="6"/>
    <rect x="130" y="145" width="12" height="160" rx="6"/>
    <rect x="150" y="170" width="12" height="110" rx="6"/>

    <rect x="350" y="170" width="12" height="110" rx="6"/>
    <rect x="370" y="145" width="12" height="160" rx="6"/>
    <rect x="390" y="120" width="12" height="210" rx="6"/>
    <rect x="410" y="145" width="12" height="160" rx="6"/>
    <rect x="430" y="170" width="12" height="110" rx="6"/>
  </g>

  <!-- M Logo -->
  <path
    d="M160 360
       V145
       L256 275
       L352 145
       V340
       C352 365 372 380 395 380
       C420 380 440 360 440 335
       C440 310 420 290 395 290
       C370 290 352 308 352 330
       V145"
    fill="none"
    stroke="url(#green)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Music note -->
  <circle cx="395" cy="335" r="30" fill="url(#green)"/>

  <!-- Brand -->
  <text x="256"
        y="450"
        text-anchor="middle"
        font-size="42"
        font-family="Poppins, Arial, sans-serif"
        fill="#ffffff"
        font-weight="700">
    Madhuram
  </text>
</svg>
